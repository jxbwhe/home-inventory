<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { padding-bottom: 70px; background-color: #f8f9fa; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #fff; border-top: 1px solid #ddd; z-index: 1000; }
        .nav-item { text-align: center; padding: 10px 0; color: #6c757d; text-decoration: none; font-size: 12px; flex: 1; }
        .nav-item i { font-size: 24px; display: block; margin-bottom: 2px; }
        .nav-item.active { color: #0d6efd; }
        .card-img-top { height: 150px; object-fit: cover; }
        .section { display: none; }
        .section.active { display: block; }
    </style>
</head>
<body>

<div class="container mt-4">
    <h3 class="mb-4 text-center">Home Inventory</h3>

    <!-- Dashboard Section -->
    <div id="dashboard-section" class="section active">
        <div class="row g-3 mb-4">
            <div class="col-6">
                <div class="card text-center shadow-sm">
                    <div class="card-body">
                        <h6 class="card-title text-muted">Items</h6>
                        <h3 id="dash-items">0</h3>
                    </div>
                </div>
            </div>
            <div class="col-6">
                <div class="card text-center shadow-sm">
                    <div class="card-body">
                        <h6 class="card-title text-muted">Est. Value</h6>
                        <h3 id="dash-value">$0</h3>
                    </div>
                </div>
            </div>
            <div class="col-12">
                <div class="card text-center shadow-sm">
                    <div class="card-body">
                        <h6 class="card-title text-muted">Daily Cost of Consumables</h6>
                        <h2 id="dash-daily-cost" class="text-danger">$0.00</h2>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Items Section -->
    <div id="items-section" class="section">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5>All Items</h5>
            <button class="btn btn-sm btn-primary" onclick="showSection('add-item-section')"><i class="bi bi-plus"></i> New</button>
        </div>
        <div class="row g-3" id="items-list">
            <!-- Items populated here -->
        </div>
    </div>

    <!-- Add Item Section -->
    <div id="add-item-section" class="section">
        <h5>Add New Item</h5>
        <div class="card shadow-sm">
            <div class="card-body">
                <form id="add-item-form" class="mt-2">
                    <div class="mb-3">
                        <label class="form-label">Name</label>
                        <input type="text" class="form-control" name="name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" name="description" rows="2"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Unit (e.g., pcs, kg, bottles)</label>
                        <input type="text" class="form-control" name="unit" value="pcs" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Image</label>
                        <input type="file" class="form-control" name="image" accept="image/*">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Save Item</button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Bottom Navigation -->
<div class="bottom-nav d-flex justify-content-around">
    <a href="#" class="nav-item active" onclick="showSection('dashboard-section', this)">
        <i class="bi bi-house-door"></i>
        Dashboard
    </a>
    <a href="#" class="nav-item" onclick="showSection('items-section', this)">
        <i class="bi bi-box-seam"></i>
        Items
    </a>
    <a href="#" class="nav-item" onclick="showSection('add-item-section', this)">
        <i class="bi bi-plus-circle"></i>
        Add
    </a>
</div>

<!-- Purchase Modal -->
<div class="modal fade" id="purchaseModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Record Purchase</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="purchase-form">
                    <input type="hidden" id="purchase-item-id">
                    <div class="mb-3">
                        <label class="form-label">Quantity Bought</label>
                        <input type="number" step="0.01" class="form-control" id="purchase-qty" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Total Price</label>
                        <input type="number" step="0.01" class="form-control" id="purchase-price" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Save Purchase</button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Usage Modal -->
<div class="modal fade" id="usageModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Record Usage</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="usage-form">
                    <input type="hidden" id="usage-item-id">
                    <div class="mb-3">
                        <label class="form-label">Quantity Used</label>
                        <input type="number" step="0.01" class="form-control" id="usage-qty" required>
                    </div>
                    <button type="submit" class="btn btn-warning w-100">Save Usage</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_URL = '/api';

    function showSection(sectionId, navElement = null) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(sectionId).classList.add('active');
        
        if (navElement) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            navElement.classList.add('active');
        } else {
            // Match nav active state if called programmatically
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(sectionId === 'dashboard-section') document.querySelectorAll('.nav-item')[0].classList.add('active');
            if(sectionId === 'items-section') document.querySelectorAll('.nav-item')[1].classList.add('active');
            if(sectionId === 'add-item-section') document.querySelectorAll('.nav-item')[2].classList.add('active');
        }

        if (sectionId === 'dashboard-section') loadDashboard();
        if (sectionId === 'items-section') loadItems();
    }

    async function loadDashboard() {
        const res = await fetch(`${API_URL}/dashboard`);
        const data = await res.json();
        document.getElementById('dash-items').innerText = data.total_items;
        document.getElementById('dash-value').innerText = `$${data.total_value}`;
        document.getElementById('dash-daily-cost').innerText = `$${data.total_daily_cost}`;
    }

    async function loadItems() {
        const res = await fetch(`${API_URL}/items`);
        const items = await res.json();
        const list = document.getElementById('items-list');
        list.innerHTML = '';
        
        items.forEach(item => {
            const img = item.image_url ? `<img src="${item.image_url}" class="card-img-top">` : `<div class="card-img-top bg-secondary d-flex align-items-center justify-content-center text-white"><i class="bi bi-image" style="font-size: 3rem;"></i></div>`;
            
            list.innerHTML += `
                <div class="col-6 col-md-4">
                    <div class="card shadow-sm h-100">
                        ${img}
                        <div class="card-body p-2 d-flex flex-column">
                            <h6 class="card-title text-truncate mb-1">${item.name}</h6>
                            <p class="card-text small text-muted mb-2 flex-grow-1">Qty: ${item.current_quantity} ${item.unit}<br>Cost: $${item.daily_cost}/day</p>
                            <div class="d-flex justify-content-between">
                                <button class="btn btn-sm btn-outline-success" onclick="openPurchaseModal(${item.id})" title="Add Purchase"><i class="bi bi-cart-plus"></i> Buy</button>
                                <button class="btn btn-sm btn-outline-warning" onclick="openUsageModal(${item.id})" title="Use Item"><i class="bi bi-dash-circle"></i> Use</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        });
    }

    document.getElementById('add-item-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        await fetch(`${API_URL}/items`, {
            method: 'POST',
            body: formData
        });
        e.target.reset();
        alert('Item added successfully!');
        showSection('items-section');
    });

    const purchaseModal = new bootstrap.Modal(document.getElementById('purchaseModal'));
    const usageModal = new bootstrap.Modal(document.getElementById('usageModal'));

    function openPurchaseModal(itemId) {
        document.getElementById('purchase-item-id').value = itemId;
        purchaseModal.show();
    }

    function openUsageModal(itemId) {
        document.getElementById('usage-item-id').value = itemId;
        usageModal.show();
    }

    document.getElementById('purchase-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const item_id = document.getElementById('purchase-item-id').value;
        const quantity = document.getElementById('purchase-qty').value;
        const price = document.getElementById('purchase-price').value;
        
        await fetch(`${API_URL}/purchases`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ item_id: parseInt(item_id), quantity: parseFloat(quantity), price: parseFloat(price) })
        });
        
        purchaseModal.hide();
        e.target.reset();
        loadItems();
    });

    document.getElementById('usage-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const item_id = document.getElementById('usage-item-id').value;
        const quantity = document.getElementById('usage-qty').value;
        
        const res = await fetch(`${API_URL}/usages`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ item_id: parseInt(item_id), quantity: parseFloat(quantity) })
        });
        
        if (!res.ok) {
            const data = await res.json();
            alert(data.detail || 'Error recording usage');
        } else {
            usageModal.hide();
            e.target.reset();
            loadItems();
        }
    });

    // Init
    loadDashboard();
</script>
</body>
</html>
